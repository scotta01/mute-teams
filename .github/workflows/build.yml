name: "FAP: Build for multiple SDK sources"
# Builds the app against the dev and release SDK channels on every push and PR,
# and daily to catch SDK drift.
# See https://github.com/marketplace/actions/build-flipper-application-package-fap
#
# Security hardening (public repo):
#  - Uses `pull_request` (NOT `pull_request_target`): fork PRs run with a
#    read-only token and no access to secrets, and cannot run privileged code.
#  - Least-privilege GITHUB_TOKEN: read-only, set at workflow level so it
#    applies even if the repo default is read/write.
#  - Third-party and first-party actions are pinned to a full commit SHA so a
#    moved tag cannot inject code into CI. Version is noted in the trailing
#    comment for Dependabot/Renovate.

on:
  push:
    ## Restrict to your main branch(es) if you want fewer runs, e.g.:
    #branches:
    #  - main
  pull_request:
  schedule:
    # do a build every day
    - cron: "1 1 * * *"

# Least privilege: this build job only needs to read the repo. No job here
# writes to the repo, posts comments, or needs other scopes.
permissions:
  contents: read

jobs:
  ufbt-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: dev channel
            sdk-channel: dev
          - name: release channel
            sdk-channel: release
          # You can add unofficial channels here. See ufbt action docs for more info.
    name: 'ufbt: Build for ${{ matrix.name }}'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Build job does not push; don't leave the token in .git/config.
          persist-credentials: false
      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@e7cd34914e61ddc056acd8daaab96d8b4d4d9f55 # v0.1.4
        id: build-app
        with:
          sdk-channel: ${{ matrix.sdk-channel }}
      - name: Upload app artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # See ufbt action docs for other output variables
          name: ${{ github.event.repository.name }}-${{ steps.build-app.outputs.suffix }}
          path: ${{ steps.build-app.outputs.fap-artifacts }}
